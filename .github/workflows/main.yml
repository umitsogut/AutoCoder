name: AutoCoder Workflow

on:
  issues:
    types:
      - opened
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write

jobs:
  autocoder:
    if: contains(github.event.issue.labels.*.name, 'autocoder-bot')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make Script Executable
        run: chmod +x scripts/script.sh

      - name: Generate Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./scripts/script.sh \
            "$GITHUB_TOKEN" \
            "$REPOSITORY" \
            "$ISSUE_NUMBER" \
            "$OPENAI_API_KEY"

      - name: Configure Git
        run: |
          git config user.name "autocoder-bot"
          git config user.email "actions@github.com"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: autocoder-branch-${{ github.event.issue.number }}
          base: main
          labels: autocoder-bot
          commit-message: "Generate code for issue #${{ github.event.issue.number }}"
          title: "Auto-generated code for issue #${{ github.event.issue.number }}"
          body: |
            This pull request contains code generated automatically by AutoCoder.